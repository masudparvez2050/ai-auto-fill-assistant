<!DOCTYPE html>
<html>
  <head>
    <title>AI Auto Fill Assistant</title>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 320px;
        padding: 15px;
      }
      h1 {
        font-size: 18px;
        color: #333;
        text-align: center;
        margin-bottom: 20px;
      }
      .settings-container {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      select,
      input {
        width: 100%;
        padding: 8px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .api-key-container {
        margin-top: 10px;
      }
      button {
        background-color: #4285f4;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 4px;
        width: 100%;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background-color: #3367d6;
      }
      .status {
        margin-top: 10px;
        text-align: center;
        color: green;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <h1>AI Auto Fill Assistant</h1>

    <div class="settings-container">
      <label for="ai-provider">AI Provider:</label>
      <select id="ai-provider">
        <option value="gemini">Google Gemini</option>
        <option value="openai">OpenAI</option>
        <option value="claude">Anthropic Claude</option>
      </select>

      <div id="gemini-settings" class="api-key-container">
        <label for="gemini-api-key">Gemini API Key:</label>
        <input
          type="password"
          id="gemini-api-key"
          placeholder="Enter your Gemini API Key"
        />
        <label for="gemini-model">Model:</label>
        <select id="gemini-model">
          <option value="gemini-2.5-flash-preview-04-17">
            Gemini 2.5 Flash Preview
          </option>
          <option value="gemini-2.5-flash-preview-05-20">
            Gemini 2.5 Flash
          </option>
          <option value="gemini-2.5-pro-preview-05-06">
            Gemini 2.5 Pro Preview
          </option>
          <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
          <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash Lite</option>
          <option value="gemini-2.0-flash-preview-image-generation">
            Gemini 2.0 Flash Preview
          </option>

          <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
          <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
        </select>
      </div>

      <div id="openai-settings" class="api-key-container" style="display: none">
        <label for="openai-api-key">OpenAI API Key:</label>
        <input
          type="password"
          id="openai-api-key"
          placeholder="Enter your OpenAI API Key"
        />
        <label for="openai-model">Model:</label>
        <select id="openai-model">
          <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
          <option value="gpt-4">GPT-4</option>
        </select>
      </div>

      <div id="claude-settings" class="api-key-container" style="display: none">
        <label for="claude-api-key">Claude API Key:</label>
        <input
          type="password"
          id="claude-api-key"
          placeholder="Enter your Claude API Key"
        />
        <label for="claude-model">Model:</label>
        <select id="claude-model">
          <option value="claude-instant">Claude Instant</option>
          <option value="claude-2">Claude 2</option>
        </select>
      </div>
    </div>

    <button id="save-settings">Save Settings</button>
    <div id="status" class="status"></div>

    <script src="src/popup.js"></script>
  </body>
</html>
