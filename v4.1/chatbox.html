<!DOCTYPE html>
<html lang="en">
  <head>
    <title>AI Floating Chatbox</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      :root {
        --primary: #7e57c2;
        --primary-light: #9575cd;
        --primary-dark: #5e35b1;
        --secondary: #667eea;
        --accent: #764ba2;
        --text: #2c3e50;
        --text-light: #6c757d;
        --bg: #ffffff;
        --bg-alt: #f8f9fa;
        --bg-chat: #e3f2fd;
        --border: #e0e0e0;
        --success: #4caf50;
        --danger: #f44336;
        --radius: 16px;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.15);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background: transparent;
        overflow: hidden;
      }

      .chatbox-container {
        width: 380px;
        height: 500px;
        background: var(--bg);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        position: relative;
        overflow: hidden;
      }

      .chatbox-container:hover {
        box-shadow: var(--shadow-hover);
        transform: translateY(-2px);
      }

      .chatbox-header {
        background: linear-gradient(
          135deg,
          var(--secondary) 0%,
          var(--accent) 100%
        );
        color: white;
        padding: 16px 20px;
        border-radius: var(--radius) var(--radius) 0 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: move;
        -webkit-user-select: none;
        user-select: none;
        position: relative;
        overflow: hidden;
      }

      .chatbox-header::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          45deg,
          rgba(255, 255, 255, 0.1) 25%,
          transparent 25%,
          transparent 75%,
          rgba(255, 255, 255, 0.1) 75%
        );
        background-size: 20px 20px;
        animation: slide 2s linear infinite;
        opacity: 0.3;
      }

      @keyframes slide {
        0% {
          transform: translateX(-20px);
        }
        100% {
          transform: translateX(20px);
        }
      }

      .chatbox-title {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 16px;
        z-index: 1;
        position: relative;
      }

      .chatbox-controls {
        display: flex;
        gap: 10px;
        z-index: 1;
        position: relative;
      }

      .control-btn {
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
      }

      .control-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.1);
      }

      .minimize-btn:hover {
        background: rgba(255, 193, 7, 0.3);
      }

      .close-btn:hover {
        background: rgba(244, 67, 54, 0.3);
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: linear-gradient(180deg, var(--bg) 0%, var(--bg-alt) 100%);
      }

      .chat-messages::-webkit-scrollbar {
        width: 6px;
      }

      .chat-messages::-webkit-scrollbar-track {
        background: transparent;
      }

      .chat-messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }

      .chat-messages::-webkit-scrollbar-thumb:hover {
        background: var(--text-light);
      }

      .message {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        animation: fadeInUp 0.3s ease;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        flex-direction: row-reverse;
      }

      .message-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        color: white;
        flex-shrink: 0;
      }

      .user-avatar {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--primary-dark) 100%
        );
      }

      .ai-avatar {
        background: linear-gradient(
          135deg,
          var(--secondary) 0%,
          var(--accent) 100%
        );
      }

      .message-content {
        background: var(--bg);
        padding: 12px 16px;
        border-radius: var(--radius);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        max-width: 80%;
        word-wrap: break-word;
        border: 1px solid var(--border);
      }

      .user .message-content {
        background: linear-gradient(
          135deg,
          var(--primary-light) 0%,
          var(--primary) 100%
        );
        color: white;
        border: none;
      }

      .message-time {
        font-size: 11px;
        color: var(--text-light);
        margin-top: 4px;
        opacity: 0.7;
      }

      .chat-input-container {
        padding: 16px 20px;
        border-top: 1px solid var(--border);
        background: var(--bg);
        border-radius: 0 0 var(--radius) var(--radius);
      }

      .chat-input-wrapper {
        display: flex;
        gap: 12px;
        align-items: flex-end;
      }

      .chat-input {
        flex: 1;
        border: 2px solid var(--border);
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 14px;
        resize: none;
        outline: none;
        transition: all 0.2s ease;
        font-family: inherit;
        background: var(--bg-alt);
        min-height: 40px;
        max-height: 100px;
      }

      .chat-input:focus {
        border-color: var(--primary-light);
        box-shadow: 0 0 0 3px rgba(126, 87, 194, 0.1);
        background: var(--bg);
      }

      .send-btn {
        width: 44px;
        height: 44px;
        border: none;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--primary-dark) 100%
        );
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        font-size: 16px;
      }

      .send-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 12px rgba(126, 87, 194, 0.3);
      }

      .send-btn:active {
        transform: scale(0.95);
      }

      .typing-indicator {
        display: none;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        background: var(--bg-alt);
        border-radius: var(--radius);
        margin: 8px 0;
      }

      .typing-dots {
        display: flex;
        gap: 4px;
      }

      .typing-dot {
        width: 8px;
        height: 8px;
        background: var(--text-light);
        border-radius: 50%;
        animation: typing 1.4s infinite ease-in-out;
      }

      .typing-dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .typing-dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes typing {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        30% {
          transform: translateY(-10px);
          opacity: 1;
        }
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-light);
        text-align: center;
        padding: 40px;
      }

      .empty-state i {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.3;
      }

      .empty-state h3 {
        margin-bottom: 8px;
        color: var(--text);
      }

      .empty-state p {
        font-size: 14px;
        line-height: 1.5;
      }

      /* Selected Text Banner Styles */
      .selected-text-banner {
        background: linear-gradient(135deg, var(--secondary), var(--accent));
        color: white;
        padding: 16px;
        margin: 16px;
        border-radius: 12px;
        box-shadow: var(--shadow);
        animation: slideInDown 0.4s ease;
      }

      .banner-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 14px;
      }

      .banner-header i {
        font-size: 16px;
      }

      .clear-selection-btn {
        margin-left: auto;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
      }

      .clear-selection-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.1);
      }

      .banner-content {
        background: rgba(255, 255, 255, 0.1);
        padding: 12px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.4;
        max-height: 80px;
        overflow-y: auto;
        word-wrap: break-word;
      }

      @keyframes slideInDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="chatbox-container" id="chatboxContainer">
      <div class="chatbox-header" id="chatboxHeader">
        <div class="chatbox-title">
          <i class="fas fa-robot"></i>
          AI Assistant
        </div>
        <div class="chatbox-controls">
          <button
            class="control-btn minimize-btn"
            id="minimizeBtn"
            title="Minimize"
          >
            <i class="fas fa-minus"></i>
          </button>
          <button class="control-btn close-btn" id="closeBtn" title="Close">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="empty-state">
          <i class="fas fa-comments"></i>
          <h3>Start a conversation</h3>
          <p>
            Ask me anything! I'm here to help you with questions, provide
            information, or just have a chat.
          </p>
        </div>
      </div>

      <div class="typing-indicator" id="typingIndicator">
        <div class="message-avatar ai-avatar">
          <i class="fas fa-robot"></i>
        </div>
        <div class="typing-dots">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>

      <div class="chat-input-container">
        <div class="chat-input-wrapper">
          <textarea
            class="chat-input"
            id="chatInput"
            placeholder="Type your message..."
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn" title="Send message">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>

    <script src="src/chatbox.js"></script>
  </body>
</html>
